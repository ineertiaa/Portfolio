    <h1 style='color: white; text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); font-family: "Archivo Black", "sans-serif"; text-align: center; padding-top: 600px;'>Servers You Should Join</h1>

<div class="servercontainer">
    <div class="discordservers">
        <script>
            const servers = [
                {header: "Casual Server", id: "1479822667891871876", logo: "https://cdn.discordapp.com/icons/1479822667891871876/2596753c0467247b9a997b4fe92d3efa.webp?size=160&quality=lossless", link: "https://discord.gg/tseF5fXWPM"},
                {header: "Coding Server", id: "1416537359360593920", logo: "https://cdn.discordapp.com/icons/1416537359360593920/0716fdf7a623271f57fe235b07f9b163.webp?size=160&quality=lossless", link: "https://discord.gg/qPTxUJsYsd"},
                {header: "Newest Game", id: "1509974867888308344", logo: "https://cdn.discordapp.com/icons/1509974867888308344/8c88157098a48baadf027d8ce4d79ad2.webp?size=160&quality=lossless", link: "https://discord.gg/CvfghUt8JF"},

            ];

            const doubledServers = [...servers, ...servers, ...servers, ...servers];

            const container = document.querySelector('.discordservers');
            doubledServers.forEach(server => {
                const panel = document.createElement('a');
                panel.className = 'server';
                panel.target = "_blank";
                panel.href = server.link;

                panel.innerHTML = `
                <h1>${server.header}</h1>
                <div class="serverheader">
                    <img src="${server.logo}" alt="Server Logo">
                    <h2>Loading...</h2>
                </div>
                <p class="membercount">Loading...</p>
                <p class="online" style="color: green; text-shadow: 0 0 10px green">Loading...</p>
                `;

            const invitecode = server.link.split('/').pop();

            const url = `https://discord.com/api/v9/invites/${invitecode}?with_counts=true`;
            const proxyurl = `https://corsproxy.io/?${encodeURIComponent(url)}`;

            container.appendChild(panel);
            fetch(proxyurl)
            .then(response => {
                if (!response.ok) throw new Error("Unavailable")
                return response.json();
            })
            .then(data => {

                panel.querySelector("h2").innerText = data.guild.name;
                panel.querySelector(".membercount").innerText = `${data.approximate_member_count} Members`;
                panel.querySelector(".online").innerText = `${data.approximate_presence_count} Online`;
            })
            .catch(error =>{
                panel.querySelector("h2").innerText = "Widget Offline";
                panel.querySelector(".membercount").innerText = "Error: check_settings";
                panel.querySelector(".online").innerText = "Error: check_settings";
            });

            })

        </script>
    </div>
