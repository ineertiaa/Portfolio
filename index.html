    <h1 style='color: white; text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3); font-family: "Archivo Black", "sans-serif"; text-align: center; padding-top: 600px;'>Servers You Should Join</h1>

    <h1 id="scrollprompt">(Scroll for more) ></h1>
<div class="servercontainer">
    <div class="discordservers">
        <script>
            const servers = [
                {header: "Casual Server", id: "1479822667891871876", logo: "https://cdn.discordapp.com/icons/1479822667891871876/2596753c0467247b9a997b4fe92d3efa.webp?size=160&quality=lossless", link: "https://discord.gg/JF8rGD8QpA"},
                {header: "Coding Server", id: "1416537359360593920", logo: "https://cdn.discordapp.com/icons/1416537359360593920/0716fdf7a623271f57fe235b07f9b163.webp?size=160&quality=lossless", link: "https://discord.gg/qPTxUJsYsd"},
                {header: "Newest Game", id: "1509974867888308344", logo: "https://cdn.discordapp.com/icons/1509974867888308344/8c88157098a48baadf027d8ce4d79ad2.webp?size=160&quality=lossless", link: "https://discord.gg/2tFRyHMzxs"}
            ];

            const container = document.querySelector('.discordservers');
            servers.forEach(server => {
                const panel = document.createElement('a');
                panel.className = 'server';
                panel.target = "_blank";
                panel.href = server.link;

                panel.innerHTML = `
                <h1>${server.header}</h1>
                <div class="serverheader">
                    <img src="${server.logo}" alt="Server Logo">
                    <h2>Loading...</h2>
                </div>
                <p class="online" style="color: green; text-shadow: 0 0 10px green">Loading...</p>
                `;

            const url = `https://discord.com/api/guilds/${server.id}/widget.json`;

            container.appendChild(panel);
            fetch(url)
            .then(response => {
                if (!response.ok) throw new Error("Unavailable")
                return response.json();
            })
            .then(data => {

                panel.querySelector("h2").innerText = data.name;
                panel.querySelector(".online").innerText = `${data.presence_count} Online`;
            })
            .catch(error =>{
                panel.querySelector("h2").innerText = "Widget Offline";
                panel.querySelector(".online").innerText = "Error: check_settings";
            });

            })

        </script>
    </div>
    
</div>

    <script>
        const scrollprompt = document.getElementById("scrollprompt");
        const containertotrack = document.querySelector(".servercontainer");

        containertotrack.addEventListener("scroll", function scrollhandler(){
            if (containertotrack.scrollLeft > 0.5){
                scrollprompt.classList.add("hidden");
            }

            containertotrack.removeEventListener("scroll", scrollhandler);
        });
    </script>
